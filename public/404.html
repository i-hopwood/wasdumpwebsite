<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages 404 redirect for Vue Router (createWebHistory)
      // Converts the path into a query string that index.html can pick back up
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const redirectUrl = '/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
</html>
