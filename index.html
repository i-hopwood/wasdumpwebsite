    <!-- GitHub Pages SPA redirect receiver (pairs with public/404.html) -->
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search)
        const p = params.get('p')
        if (p) {
          params.delete('p')
          const remaining = params.toString()
          const newUrl = p + (remaining ? '?' + remaining : '') + window.location.hash
          window.history.replaceState(null, '', newUrl)
        }
      })()
    </script>
